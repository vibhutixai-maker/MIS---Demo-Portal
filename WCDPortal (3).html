<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WCD MIS Portal — Government of Karnataka</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0B1D35;--blue:#1A4480;--teal:#0B6E73;--gold:#B5780A;
  --green:#1F6B2E;--red:#B42222;--amber:#C06A00;
  --bg:#EEF2F7;--card:#FFFFFF;--border:#D4DBE8;--text:#0B1D35;--muted:#5A6B82;
  --crit:#FEE2E2;--crit-b:#B42222;--warn:#FEF3C7;--warn-b:#C06A00;--ok:#DCFCE7;--ok-b:#1F6B2E;
}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#EEF2F7}
::-webkit-scrollbar-thumb{background:#B0BEC5;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:var(--navy);height:54px;display:flex;align-items:center;gap:14px;padding:0 20px;flex-shrink:0;border-bottom:2px solid #1A4480}
.logo{width:30px;height:30px;border-radius:6px;background:linear-gradient(135deg,#C8831A,#F4A322);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tb-brand .tb-title{color:#fff;font-weight:700;font-size:14px;line-height:1.2}
.tb-brand .tb-sub{color:rgba(255,255,255,.45);font-size:10px;font-family:'IBM Plex Mono',monospace}
.tb-spacer{flex:1}
.tb-date{color:rgba(255,255,255,.5);font-size:11px;font-family:'IBM Plex Mono',monospace}
.tb-user{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;font-size:13px}
#body{display:flex;flex:1;overflow:hidden}

/* ── Sidebar ── */
#sidebar{width:200px;background:var(--navy);flex-shrink:0;display:flex;flex-direction:column;padding:12px 8px;gap:2px;overflow-y:auto;border-right:1px solid rgba(255,255,255,.08)}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);letter-spacing:1.5px;padding:8px 8px 4px;text-transform:uppercase;margin-top:4px}
.nav-btn{width:100%;text-align:left;border:none;border-radius:7px;padding:8px 10px;cursor:pointer;color:rgba(255,255,255,.55);font-weight:500;font-size:12px;display:flex;align-items:center;gap:9px;background:transparent;font-family:inherit;transition:all .15s}
.nav-btn:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.nav-btn.active{background:rgba(26,68,128,.6);color:#fff;font-weight:700}
.nav-btn .nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-new{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:#B42222;color:#fff;margin-left:auto}
.sidebar-footer{margin-top:auto;padding:10px 4px}
.sf-box{background:rgba(26,68,128,.5);border-radius:8px;padding:10px 12px;border:1px solid rgba(26,68,128,.8)}
.sf-title{font-size:9px;font-weight:700;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:6px}
.sf-row{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px;color:rgba(255,255,255,.6)}
.sf-row span:last-child{font-weight:700;font-family:'IBM Plex Mono',monospace;color:#fff}

/* ── Main ── */
#main{flex:1;overflow-y:auto;background:var(--bg);padding:16px}
.page{animation:fadeUp .2s ease}

/* ── Cards ── */
.card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 8px rgba(0,0,0,.06);border:1px solid var(--border)}
.ct{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:12px}

/* ── KPI Grid ── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 8px rgba(0,0,0,.06);border:1px solid var(--border);border-left:4px solid var(--blue);display:flex;flex-direction:column;gap:4px}
.kpi .kpi-top{display:flex;align-items:center;gap:6px}
.kpi .kpi-icon{font-size:18px}
.kpi .kpi-badge{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-left:auto}
.kpi .kpi-val{font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1}
.kpi .kpi-lbl{font-size:11px;color:var(--muted)}
.badge-pos{background:#DCFCE7;color:#1F6B2E}
.badge-neg{background:#FEE2E2;color:#B42222}
.badge-neu{background:#EEF2F7;color:#1A4480}

/* ── Severity ── */
.sev-crit{background:var(--crit);color:var(--crit-b)}
.sev-warn{background:var(--warn);color:var(--warn-b)}
.sev-ok{background:var(--ok);color:var(--ok-b)}
.sev-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}

/* ── Tabs ── */
.tab-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab-btn{background:#fff;color:var(--muted);border:1.5px solid var(--border);border-radius:7px;padding:5px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.tab-btn:hover{border-color:var(--blue);color:var(--blue)}
.tab-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab-btn.active.teal{background:var(--teal);border-color:var(--teal)}
.tab-btn.active.red{background:var(--red);border-color:var(--red)}
.tab-btn.active.green{background:var(--green);border-color:var(--green)}
.tab-btn.active.gold{background:var(--gold);border-color:var(--gold)}

/* ── Hero ── */
.hero{border-radius:12px;padding:22px 28px;color:#fff;margin-bottom:14px;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 60%,var(--teal) 100%)}
.hero:before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,.04);pointer-events:none}
.hero-rel{position:relative}
.hero-ey{font-size:10px;font-weight:700;opacity:.6;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.hero-t{font-family:'Playfair Display',Georgia,serif;font-size:22px;font-weight:800;margin-bottom:4px}
.hero-s{font-size:13px;opacity:.8;margin-bottom:3px}
.hero-m{font-size:11px;opacity:.55;margin-bottom:16px;font-family:'IBM Plex Mono',monospace}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap}
.hero-btn{border:1.5px solid rgba(255,255,255,.25);border-radius:7px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.hero-btn:hover{background:rgba(255,255,255,.15)}

/* ── Alerts ── */
.alert{border-radius:8px;padding:9px 12px;margin-bottom:7px}
.alert .al{font-size:12px;font-weight:700;margin-bottom:1px}
.alert .as{font-size:11px;color:var(--text)}
.ar{background:var(--crit);border-left:3px solid var(--crit-b)}.ar .al{color:var(--crit-b)}
.aa{background:var(--warn);border-left:3px solid var(--warn-b)}.aa .al{color:var(--warn-b)}
.ag{background:var(--ok);border-left:3px solid var(--ok-b)}.ag .al{color:var(--ok-b)}

/* ── Progress ── */
.prog-row{margin-bottom:8px}
.prog-hd{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.prog-name{font-weight:600}
.prog-track{height:5px;border-radius:3px;background:#E8ECF4;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:9px 11px;text-align:left;font-weight:700;color:var(--navy);font-size:10px;background:#F5F7FA;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border)}
.tbl td{padding:9px 11px;border-bottom:1px solid #F0F2F7;vertical-align:middle}
.tbl tr:hover td{background:#F8F9FC;cursor:pointer}
.tbl .rank{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);width:30px}
.tbl .drill{color:var(--blue);font-size:11px;font-weight:700;text-decoration:none;cursor:pointer;white-space:nowrap}
.tbl .drill:hover{text-decoration:underline}

/* ── Breadcrumb ── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:14px;padding:10px 14px;background:#fff;border-radius:8px;border:1px solid var(--border)}
.bc-item{color:var(--blue);cursor:pointer;font-weight:600}
.bc-item:hover{text-decoration:underline}
.bc-item.active{color:var(--muted);font-weight:400;cursor:default}
.bc-sep{color:var(--muted);font-size:10px}
.bc-back{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:4px}

/* ── Drill-down specific ── */
.drill-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.drill-full{grid-column:span 2}
.scheme-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.stab{border:1.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;background:#fff;transition:all .15s;display:flex;align-items:center;gap:7px}
.stab:hover{border-color:var(--blue)}
.stab.active{color:#fff;border-color:transparent}
.stab .stab-icon{font-size:16px}
.stab .stab-lbl{line-height:1.2}
.stab .stab-sub{font-size:10px;font-weight:400;opacity:.75;display:block}

/* ── Level indicator ── */
.level-indicator{display:flex;gap:0;margin-bottom:14px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.level-step{flex:1;padding:8px 12px;font-size:11px;font-weight:600;text-align:center;background:#fff;color:var(--muted);border-right:1px solid var(--border);position:relative}
.level-step:last-child{border-right:none}
.level-step.active{background:var(--blue);color:#fff}
.level-step.done{background:#EEF2F7;color:var(--blue)}

/* ── Flag button ── */
.flag-btn{border:1px solid var(--crit-b);background:#fff;color:var(--crit-b);border-radius:5px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.flag-btn:hover{background:var(--crit);color:var(--crit-b)}
.flag-btn.flagged{background:var(--crit-b);color:#fff}
.flag-count-badge{position:fixed;bottom:20px;right:20px;background:var(--crit-b);color:#fff;border-radius:50px;padding:10px 18px;font-size:13px;font-weight:700;box-shadow:0 4px 20px rgba(180,34,34,.4);cursor:pointer;z-index:100;display:none;animation:fadeUp .3s ease}

/* ── Intervention panel ── */
.int-panel{background:var(--navy);color:#fff;border-radius:10px;padding:16px;margin-bottom:12px}
.int-title{font-family:'Playfair Display',serif;font-size:16px;margin-bottom:4px}
.int-sub{font-size:11px;opacity:.55;font-family:'IBM Plex Mono',monospace;margin-bottom:12px}
.int-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:rgba(255,255,255,.06);border-radius:7px;margin-bottom:6px;font-size:12px}
.int-item .int-name{font-weight:600}
.int-item .int-meta{font-size:10px;opacity:.6;margin-top:1px}
.int-remove{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;font-family:inherit}

/* ── Module header ── */
.mhdr{border-radius:10px;padding:16px 20px;color:#fff;margin-bottom:14px}
.mhdr h3{font-family:'Playfair Display',Georgia,serif;font-size:18px;margin-bottom:3px}
.mhdr p{opacity:.7;font-size:12px}

/* ── Utility bar ── */
.util-bar{display:flex;align-items:center;gap:5px}
.util-track{width:44px;height:5px;border-radius:3px;background:#E0E5EE;overflow:hidden}
.util-fill{height:100%;border-radius:3px}

/* ── Chat ── */
.chat-msgs{height:360px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-row{display:flex;gap:8px}
.chat-row.user{justify-content:flex-end}
.chat-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.chat-bbl{max-width:80%;border-radius:14px;padding:10px 14px;font-size:12px;line-height:1.7;white-space:pre-wrap}
.bot-bbl{background:#F5F7FA;color:var(--text);border-radius:14px 14px 14px 3px}
.user-bbl{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;border-radius:14px 14px 3px 14px}
.chat-dots{display:flex;gap:5px;padding:12px 14px;background:#F5F7FA;border-radius:14px 14px 14px 3px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:pulse 1.2s infinite}
.chat-inp-row{padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px}
.chat-inp{flex:1;border:1.5px solid var(--border);border-radius:20px;padding:8px 16px;font-size:12px;outline:none;font-family:inherit}
.chat-inp:focus{border-color:var(--blue)}
.chat-send{background:linear-gradient(135deg,var(--blue),var(--teal));border:none;border-radius:20px;padding:8px 18px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit}

/* ── Grids ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.span2{grid-column:span 2}
.mb12{margin-bottom:12px}

/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fl{font-size:11px;font-weight:700;color:var(--navy)}
.fi{border:1.5px solid var(--border);border-radius:7px;padding:8px 12px;font-size:12px;outline:none;font-family:inherit;width:100%}
.fi:focus{border-color:var(--blue)}
.btn-save{background:var(--green);border:none;border-radius:7px;padding:10px 24px;color:#fff;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.saved-ok{color:var(--green);font-weight:700;font-size:12px;display:none}
.saved-ok.show{display:inline}

/* ── Hotspot row ── */
.hs-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;margin-bottom:5px;background:#FAFBFD;border:1px solid #EEF1F8;transition:background .15s;cursor:pointer}
.hs-row:hover{background:#F0F3FB}
.hs-rank{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--muted);width:20px;flex-shrink:0;text-align:center}
.hs-name{flex:1;font-size:12px;font-weight:600;color:var(--navy)}
.hs-sub{font-size:10px;color:var(--muted)}
.hs-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:800}
.hs-bar{width:60px;height:6px;background:#E8ECF4;border-radius:3px;overflow:hidden;flex-shrink:0}
.hs-bar-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── AWC Profile ── */
.awc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.awc-stat{background:#F5F7FA;border-radius:8px;padding:12px;text-align:center}
.awc-stat .v{font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace}
.awc-stat .l{font-size:10px;color:var(--muted);margin-top:2px}
.infra-check{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ic{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600}
.ic.yes{background:#DCFCE7;color:#1F6B2E}
.ic.no{background:#FEE2E2;color:#B42222}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">🏛️</div>
    <div class="tb-brand"><div class="tb-title">WCD MIS Portal</div><div class="tb-sub">Government of Karnataka · FY 2024-25</div></div>
    <div class="tb-spacer"></div>
    <div id="flagCountBadge" class="flag-count-badge" onclick="showFlagPanel()">🚩 <span id="flagCount">0</span> Interventions Flagged</div>
    <div class="tb-date" id="tbDate"></div>
    <div class="tb-user">👤</div>
  </div>
  <div id="body">
    <div id="sidebar">
      <div class="nav-section">Overview</div>
      <button class="nav-btn active" onclick="go('home')" id="nb-home"><span class="nav-icon">📊</span>State Dashboard</button>
      <div class="nav-section">Drill-Down Analysis</div>
      <button class="nav-btn" onclick="go('drill')" id="nb-drill"><span class="nav-icon">🔍</span>Geographic Explorer<span class="nav-new">NEW</span></button>
      <button class="nav-btn" onclick="go('hotspot')" id="nb-hotspot"><span class="nav-icon">🔥</span>Hot Spot Finder</button>
      <div class="nav-section">Scheme Modules</div>
      <button class="nav-btn" onclick="go('wcd')" id="nb-wcd"><span class="nav-icon">👩‍👧</span>WCD Schemes</button>
      <button class="nav-btn" onclick="go('disbud')" id="nb-disbud"><span class="nav-icon">♿</span>Disability Budget</button>
      <button class="nav-btn" onclick="go('ai')" id="nb-ai"><span class="nav-icon">🤖</span>AI Analytics</button>
      <div class="sidebar-footer">
        <div class="sf-box">
          <div class="sf-title">STATE SNAPSHOT</div>
          <div class="sf-row"><span>Beneficiaries</span><span>2.84 Cr</span></div>
          <div class="sf-row"><span>AWCs</span><span>65,247</span></div>
          <div class="sf-row"><span>Districts</span><span>31</span></div>
          <div class="sf-row"><span>Budget Util</span><span>82.4%</span></div>
        </div>
      </div>
    </div>
    <div id="main"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// DATA GENERATION
// ═══════════════════════════════════════════════════════════════════════
function sr(seed){let x=Math.sin(seed+1)*10000;return x-Math.floor(x);}
function rnd(min,max,seed){return Math.floor(sr(seed)*(max-min+1))+min;}

// Deprivation factor: higher = more malnutrition, infrastructure gaps, etc.
const DISTRICTS_DEF = [
  {name:"Kalaburagi",df:1.90,talukas:["Kalaburagi","Aland","Chincholi","Afzalpur","Jevargi","Sedam"]},
  {name:"Raichur",df:1.85,talukas:["Raichur","Sindhnur","Manvi","Lingasugur","Devadurga"]},
  {name:"Ballari",df:1.60,talukas:["Ballari","Hospet","Sandur","Siruguppa","Hadagali"]},
  {name:"Vijayapura",df:1.45,talukas:["Vijayapura","Sindagi","Muddebihal","Basavana Bagewadi","Indi"]},
  {name:"Belagavi",df:1.30,talukas:["Belagavi","Chikodi","Gokak","Athani","Raibag","Hukkeri"]},
  {name:"Dharwad",df:1.10,talukas:["Dharwad","Hubli","Kundgol","Navalgund","Kalghatgi"]},
  {name:"Tumakuru",df:1.00,talukas:["Tumakuru","Tiptur","Madhugiri","Pavagada","Koratagere","Sira"]},
  {name:"Hassan",df:0.85,talukas:["Hassan","Belur","Arsikere","Holenarasipura","Channarayapatna"]},
  {name:"Shivamogga",df:0.78,talukas:["Shivamogga","Sagar","Soraba","Hosanagara","Thirthahalli"]},
  {name:"Mysuru",df:0.72,talukas:["Mysuru","Hunsur","Periyapatna","H D Kote","Nanjangud"]},
  {name:"Dakshina Kannada",df:0.60,talukas:["Mangaluru","Sullia","Puttur","Belthangady","Bantwal"]},
  {name:"Bengaluru Urban",df:0.55,talukas:["Bengaluru North","Bengaluru South","Bengaluru East","Yelahanka","RR Nagar"]},
];

const VILLAGE_PREFIXES=["Gundagurthi","Mallapura","Kadagala","Honagere","Bevinagere","Chikkaholalu","Basaveshwaranagar","Alekhan","Gorebal","Kothapalli","Medikera","Hosakere","Siddapura","Tandur","Rampur","Yargera","Ukkali","Yadgiri","Bheemarayanagudi","Jalahalli"];

let awcCounter = 0;

function genAWC(awcIdx, talukaName, districtDf, talukaVariance) {
  const s = awcIdx * 37 + 7;
  const df = districtDf * (0.75 + talukaVariance * 0.5);
  const village = VILLAGE_PREFIXES[awcIdx % VILLAGE_PREFIXES.length];
  const totalChildren = rnd(28, 65, s);
  const sam = Math.max(0, Math.round(totalChildren * (0.018 + df * 0.022) * (0.7 + sr(s+1)*0.6)));
  const mam = Math.max(0, Math.round(totalChildren * (0.06 + df * 0.04) * (0.7 + sr(s+2)*0.6)));
  const underweight = Math.max(0, Math.round(totalChildren * (0.12 + df * 0.08) * (0.8 + sr(s+3)*0.4)));
  const anemia = Math.max(0, Math.round(totalChildren * (0.18 + df * 0.12) * (0.7 + sr(s+4)*0.6)));
  const stunted = Math.max(0, Math.round(totalChildren * (0.20 + df * 0.10) * (0.7 + sr(s+5)*0.6)));

  const infraSeed = s + 100;
  const buildingOwn = sr(infraSeed+1) > (0.08 + df * 0.06);
  const toilet = sr(infraSeed+2) > (0.20 + df * 0.12);
  const kitchen = sr(infraSeed+3) > (0.15 + df * 0.10);
  const drinkingWater = sr(infraSeed+4) > (0.12 + df * 0.10);
  const electricity = sr(infraSeed+5) > (0.08 + df * 0.06);
  const weighingScale = sr(infraSeed+6) > (0.05 + df * 0.05);
  const heightScale = sr(infraSeed+7) > (0.08 + df * 0.06);
  const smartphone = sr(infraSeed+8) > (0.10 + df * 0.08);
  const awwPresent = sr(infraSeed+9) > (0.04 + df * 0.03);
  const awhPresent = sr(infraSeed+10) > (0.12 + df * 0.10);
  const snpStock = sr(infraSeed+11) > (0.10 + df * 0.08);

  const infraScore = [buildingOwn,toilet,kitchen,drinkingWater,electricity,weighingScale,heightScale,smartphone,awwPresent,awhPresent].filter(Boolean).length;

  const pvCoverage = Math.min(98, Math.max(45, Math.round(85 - df * 15 + sr(s+200)*20)));
  const snpCoverage = Math.min(95, Math.max(40, Math.round(78 - df * 12 + sr(s+201)*18)));

  const childMarriageCases = Math.max(0, Math.round((df > 1.2 ? rnd(0,3,s+300) : rnd(0,1,s+300))));
  const childLabourCases = Math.max(0, Math.round((df > 1.3 ? rnd(0,5,s+301) : rnd(0,2,s+301))));
  const dvCases = Math.max(0, rnd(0, Math.round(4 * df), s+302));

  return {
    id: awcCounter++, name: `${village} AWC`, sector: `Sector-${String.fromCharCode(65+(awcIdx%4))}`,
    totalChildren, sam, mam, underweight, anemia, stunted,
    buildingOwn, toilet, kitchen, drinkingWater, electricity, weighingScale, heightScale, smartphone, awwPresent, awhPresent, snpStock,
    infraScore, pvCoverage, snpCoverage,
    childMarriageCases, childLabourCases, dvCases,
    pmmvyBeneficiaries: rnd(8,22,s+400), pmmvy1stInstallment: rnd(5,20,s+401),
    disabilityBeneficiaries: rnd(2,8,s+402),
    seniorCitizenCount: rnd(15,45,s+403),
    oscCases: dvCases > 0 ? rnd(dvCases, dvCases+2, s+404) : 0,
  };
}

function genTaluka(tIdx, talukaName, districtIdx, districtDf) {
  const variance = sr(tIdx * 17 + districtIdx * 53); // taluka-specific variance within district
  const awcCount = rnd(8, 12, tIdx * 7 + districtIdx * 31);
  const awcs = Array.from({length: awcCount}, (_, i) => genAWC(tIdx * 100 + i, talukaName, districtDf, variance));
  // Aggregate
  const agg = (f) => awcs.reduce((s, a) => s + f(a), 0);
  return {
    id: `t_${districtIdx}_${tIdx}`, name: talukaName, districtIdx,
    awcs, awcCount,
    totalChildren: agg(a => a.totalChildren),
    sam: agg(a => a.sam), mam: agg(a => a.mam),
    underweight: agg(a => a.underweight), anemia: agg(a => a.anemia), stunted: agg(a => a.stunted),
    childMarriageCases: agg(a => a.childMarriageCases),
    childLabourCases: agg(a => a.childLabourCases),
    dvCases: agg(a => a.dvCases),
    awcsWithToilet: awcs.filter(a => a.toilet).length,
    awcsWithKitchen: awcs.filter(a => a.kitchen).length,
    awcsWithWater: awcs.filter(a => a.drinkingWater).length,
    awcsWithElectricity: awcs.filter(a => a.electricity).length,
    awcsWithOwnBuilding: awcs.filter(a => a.buildingOwn).length,
    awcsWithAwwPresent: awcs.filter(a => a.awwPresent).length,
    awcsWithAwhPresent: awcs.filter(a => a.awhPresent).length,
    avgInfraScore: (awcs.reduce((s, a) => s + a.infraScore, 0) / awcs.length).toFixed(1),
    avgSnpCoverage: (awcs.reduce((s, a) => s + a.snpCoverage, 0) / awcs.length).toFixed(0),
    pmmvyBeneficiaries: agg(a => a.pmmvyBeneficiaries),
    pmmvy1stInstallment: agg(a => a.pmmvy1stInstallment),
    disabilityBeneficiaries: agg(a => a.disabilityBeneficiaries),
    seniorCitizenCount: agg(a => a.seniorCitizenCount),
  };
}

// Generate full data
const DISTRICTS = DISTRICTS_DEF.map((d, di) => {
  const talukas = d.talukas.map((name, ti) => genTaluka(ti, name, di, d.df));
  const agg = (f) => talukas.reduce((s, t) => s + f(t), 0);
  return {
    id: `d_${di}`, name: d.name, df: d.df, talukas,
    talukaCount: talukas.length,
    awcCount: talukas.reduce((s, t) => s + t.awcCount, 0),
    totalChildren: agg(t => t.totalChildren),
    sam: agg(t => t.sam), mam: agg(t => t.mam),
    underweight: agg(t => t.underweight), anemia: agg(t => t.anemia), stunted: agg(t => t.stunted),
    childMarriageCases: agg(t => t.childMarriageCases),
    childLabourCases: agg(t => t.childLabourCases),
    dvCases: agg(t => t.dvCases),
    awcsWithToilet: agg(t => t.awcsWithToilet),
    awcsWithKitchen: agg(t => t.awcsWithKitchen),
    awcsWithWater: agg(t => t.awcsWithWater),
    awcsWithElectricity: agg(t => t.awcsWithElectricity),
    awcsWithOwnBuilding: agg(t => t.awcsWithOwnBuilding),
    awcsWithAwwPresent: agg(t => t.awcsWithAwwPresent),
    pmmvyBeneficiaries: agg(t => t.pmmvyBeneficiaries),
    pmmvy1stInstallment: agg(t => t.pmmvy1stInstallment),
    disabilityBeneficiaries: agg(t => t.disabilityBeneficiaries),
    seniorCitizenCount: agg(t => t.seniorCitizenCount),
  };
});

// State-level aggregates
const STATE = {
  totalChildren: DISTRICTS.reduce((s, d) => s + d.totalChildren, 0),

function n(x){return Number(x).toLocaleString('en-IN');}

function samRate(d){return d.totalChildren?((d.sam/d.totalChildren)*100).toFixed(2):'0';}

function sevLabel(val, t1, t2){return val>=t2?'🔴 Critical':val>=t1?'🟡 High':'🟢 Normal';}

function ubar(pv){const fp=parseFloat(pv),col=fp>=80?'var(--green)':fp>=60?'var(--amber)':'var(--red)';return`<div class="util-bar"><div class="util-track"><div class="util-fill" style="width:${Math.min(fp,100)}%;background:${col}"></div></div><span style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:${col}">${pv}%</span></div>`;}

function schemeTabs(){
  const schemes=[
    {id:'nutrition',icon:'🍱',lbl:'ICDS Nutrition',sub:'SAM·MAM·Underweight'},
    {id:'infra',icon:'🏗️',lbl:'AWC Infrastructure',sub:'Toilet·Kitchen·Staff'},
    {id:'childprot',icon:'🛡️',lbl:'Child Protection',sub:'Marriage·Labour·CCI'},
    {id:'shakti',icon:'💪',lbl:'Mission Shakti',sub:'DV Cases·OSC·Shelter'},
  ];
  const colors={nutrition:'var(--red)',infra:'var(--green)',childprot:'var(--blue)',shakti:'#6B21A8'};
  return`<div class="scheme-tabs" style="margin-bottom:14px">${schemes.map(s=>`<button class="stab${drillScheme===s.id?' active':''}" style="${drillScheme===s.id?`background:${colors[s.id]};color:#fff;border-color:transparent`:''}" onclick="setDrillScheme('${s.id}')"><span class="stab-icon">${s.icon}</span><span class="stab-lbl">${s.lbl}<span class="stab-sub">${s.sub}</span></span></button>`).join('')}</div>`;
}
function setDrillScheme(id){drillScheme=id;destroyCharts();render();}

function breadcrumb(){
  const d = drillDistrict !== null ? DISTRICTS[drillDistrict] : null;
  const t = drillTaluka !== null && d ? d.talukas[drillTaluka] : null;
  let items = [`<span class="bc-item" onclick="go('drill')">🗺️ Karnataka</span>`];
  if(d) items.push(`<span class="bc-sep">›</span><span class="bc-item${drillLevel==='district'?' active':''}" onclick="drillLevel='district';drillTaluka=null;drillAWC=null;destroyCharts();render()">${d.name}</span>`);
  if(t) items.push(`<span class="bc-sep">›</span><span class="bc-item${drillLevel==='taluka'?' active':''}" onclick="drillLevel='taluka';drillAWC=null;destroyCharts();render()">${t.name}</span>`);
  if(drillAWC) items.push(`<span class="bc-sep">›</span><span class="bc-item active">${drillAWC.name}</span>`);
  return`<div class="breadcrumb">${drillLevel!=='state'?`<button class="bc-back" onclick="goBack()">← Back</button>`:''}${items.join('')}</div>`;
}
function goBack(){
  if(drillLevel==='awc'){drillLevel='taluka';drillAWC=null;}
  else if(drillLevel==='taluka'){drillLevel='district';drillTaluka=null;}
  else if(drillLevel==='district'){drillLevel='state';drillDistrict=null;}
  destroyCharts();render();
}

function levelSteps(){
  const levels=[{k:'state',l:'State'},{ k:'district',l:'District'},{k:'taluka',l:'Taluka'},{k:'awc',l:'AWC'}];
  const cur=['state','district','taluka','awc'].indexOf(drillLevel);
  return`<div class="level-indicator">${levels.map((l,i)=>`<div class="level-step${i===cur?' active':i<cur?' done':''}">${l.l}</div>`).join('')}</div>`;
}

// ── State View ────────────────────────────────────────────────────────
function rStateView(){
  return`<div class="page">${schemeTabs()}${levelSteps()}${breadcrumb()}
  <div style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:12px">
    <div><div class="card"><div class="ct">${schemeTitle()} — All Districts (Click to Drill Down)</div>
    ${rDistrictTable()}</div></div>
    <div>
      <div class="card mb12"><div class="ct">Distribution Chart</div><canvas id="distChart" height="240"></canvas></div>
      <div class="card"><div class="ct">Top Intervention Zones</div>${rTopInterventions()}</div>
    </div>
  </div></div>`;
}
function schemeTitle(){return{nutrition:'🍱 ICDS Nutrition',infra:'🏗️ AWC Infrastructure',childprot:'🛡️ Child Protection',shakti:'💪 Mission Shakti'}[drillScheme];}

    ${sorted.map((d,i)=>{const r=parseFloat(samRate(d));const cls=sevColor(r,2,3.5);const distIdx=DISTRICTS.indexOf(d);return`<tr onclick="drillTo(${distIdx})">
      <td class="rank">${i+1}</td><td><strong>${d.name}</strong><div style="font-size:10px;color:var(--muted)">${d.talukaCount} talukas · ${d.awcCount} AWCs</div></td>

    </tr>`}).join('')}</tbody></table></div>`;
  }
  if(drillScheme==='infra'){
    sorted = [...DISTRICTS].sort((a,b)=>(b.awcCount-b.awcsWithToilet)-(a.awcCount-a.awcsWithToilet));
    return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>District</th><th>AWCs</th><th>No Toilet</th><th>No Kitchen</th><th>No Water</th><th>Staff Gap</th><th>Infra Score</th><th>Flag</th></tr></thead><tbody>
    ${sorted.map((d,i)=>{const noToilet=d.awcCount-d.awcsWithToilet;const pToilet=pct(noToilet,d.awcCount);const distIdx=DISTRICTS.indexOf(d);const cls=sevColor(parseFloat(pToilet),20,35);return`<tr onclick="drillTo(${distIdx})">
      <td class="rank">${i+1}</td><td><strong>${d.name}</strong></td>
      <td style="font-family:'IBM Plex Mono',monospace">${d.awcCount}</td>
      <td>${bd(noToilet+' ('+pToilet+'%)',cls)}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${d.awcCount-d.awcsWithKitchen}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${d.awcCount-d.awcsWithWater}</td>
      <td style="font-family:'IBM Plex Mono',monospace">${d.awcCount-d.awcsWithAwwPresent}</td>
      <td>${ubar((100-parseFloat(pToilet)).toFixed(0))}</td>
      <td onclick="event.stopPropagation()"><button id="fb-inf_${distIdx}" class="flag-btn${flagged['inf_'+distIdx]?' flagged':''}" onclick="flag('inf_${distIdx}','district','${d.name}','${d.name}','','Infra Gap ${pToilet}%','${parseFloat(pToilet)>=35?'crit':parseFloat(pToilet)>=20?'warn':'ok'}')">${flagged['inf_'+distIdx]?'🚩 Flagged':'🚩 Flag'}</button></td>
    </tr>`}).join('')}</tbody></table></div>`;
  }
  if(drillScheme==='childprot'){
    sorted = [...DISTRICTS].sort((a,b)=>b.childMarriageCases-a.childMarriageCases);
    return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>District</th><th>Child Marriage</th><th>Child Labour</th><th>Total Reported</th><th>Risk Level</th><th>Flag</th></tr></thead><tbody>
    ${sorted.map((d,i)=>{const total=d.childMarriageCases+d.childLabourCases;const distIdx=DISTRICTS.indexOf(d);const cls=sevColor(d.childMarriageCases,15,30);return`<tr onclick="drillTo(${distIdx})">
      <td class="rank">${i+1}</td><td><strong>${d.name}</strong></td>

    </tr>`}).join('')}</tbody></table></div>`;
  }
  if(drillScheme==='shakti'){
    sorted = [...DISTRICTS].sort((a,b)=>b.dvCases-a.dvCases);
    return`<div class="tbl-wrap"><table class="tbl"><thead><tr><th>#</th><th>District</th><th>DV Cases</th><th>% of State</th><th>Risk</th><th>Flag</th></tr></thead><tbody>
    ${sorted.map((d,i)=>{const distIdx=DISTRICTS.indexOf(d);const cls=sevColor(d.dvCases,20,40);return`<tr onclick="drillTo(${distIdx})">
      <td class="rank">${i+1}</td><td><strong>${d.name}</strong></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-weight:700;color:#6B21A8">${n(d.dvCases)}</td>

    </tr>`}).join('')}</tbody></table></div>`;
  }
  return '';
}

function rTopInterventions(){
  if(drillScheme==='nutrition'){
    const top=DISTRICTS.filter(d=>parseFloat(samRate(d))>2.5);
    return top.map(d=>`<div class="alert ar"><div class="al">${d.name} — SAM ${samRate(d)}%</div><div class="as">${n(d.sam)} SAM · ${n(d.mam)} MAM · <a style="color:var(--crit-b);cursor:pointer" onclick="drillTo(${DISTRICTS.indexOf(d)})">Drill to talukas →</a></div></div>`).join('');
  }
  if(drillScheme==='infra'){
    const top=[...DISTRICTS].sort((a,b)=>(b.awcCount-b.awcsWithToilet)-(a.awcCount-a.awcsWithToilet)).slice(0,4);
    return top.map(d=>`<div class="alert aa"><div class="al">${d.name}</div><div class="as">${d.awcCount-d.awcsWithToilet} AWCs without toilets · ${d.awcCount-d.awcsWithKitchen} without kitchen</div></div>`).join('');
  }
  if(drillScheme==='childprot'){
    const top=[...DISTRICTS].sort((a,b)=>b.childMarriageCases-a.childMarriageCases).slice(0,4);
    return top.map(d=>`<div class="alert ${d.childMarriageCases>30?'ar':'aa'}"><div class="al">${d.name} — ${n(d.childMarriageCases)} cases</div><div class="as">Child labour: ${n(d.childLabourCases)} · <a style="color:inherit;cursor:pointer" onclick="drillTo(${DISTRICTS.indexOf(d)})">Drill down →</a></div></div>`).join('');
  }
  return DISTRICTS.filter(d=>d.dvCases>30).map(d=>`<div class="alert ar"><div class="al">${d.name} — ${n(d.dvCases)} DV cases</div></div>`).join('');
}

function iDrill(){
  if(drillLevel==='state'){
    if(drillScheme==='nutrition'){
      const sorted=[...DISTRICTS].sort((a,b)=>b.sam-a.sam);
      mkc('distChart',{type:'bar',data:{labels:sorted.map(d=>d.name.split(' ')[0]),datasets:[{label:'SAM',data:sorted.map(d=>d.sam),backgroundColor:'#FEE2E2',borderColor:'#B42222',borderWidth:1.5},{label:'MAM',data:sorted.map(d=>d.mam),backgroundColor:'#FEF3C7',borderColor:'#C06A00',borderWidth:1.5}]},options:{responsive:true,...gc,scales:{x:{ticks:{font:{size:8}}},y:{ticks:{font:{size:9}}}}}});
    } else if(drillScheme==='infra'){
      const sorted=[...DISTRICTS].sort((a,b)=>b.df-a.df);
      mkc('distChart',{type:'bar',data:{labels:sorted.map(d=>d.name.split(' ')[0]),datasets:[{label:'No Toilet',data:sorted.map(d=>d.awcCount-d.awcsWithToilet),backgroundColor:'#FEE2E2'},{label:'No Water',data:sorted.map(d=>d.awcCount-d.awcsWithWater),backgroundColor:'#DBEAFE'},{label:'No Kitchen',data:sorted.map(d=>d.awcCount-d.awcsWithKitchen),backgroundColor:'#FEF3C7'}]},options:{responsive:true,...gc,scales:{x:{stacked:true,ticks:{font:{size:8}}},y:{stacked:true,ticks:{font:{size:9}}}}}});
    } else if(drillScheme==='childprot'){
      const sorted=[...DISTRICTS].sort((a,b)=>b.childMarriageCases-a.childMarriageCases);
      mkc('distChart',{type:'bar',data:{labels:sorted.map(d=>d.name.split(' ')[0]),datasets:[{label:'Child Marriage',data:sorted.map(d=>d.childMarriageCases),backgroundColor:'#DBEAFE',borderColor:'#1A4480',borderWidth:1.5},{label:'Child Labour',data:sorted.map(d=>d.childLabourCases),backgroundColor:'#EDE9FE',borderColor:'#6B21A8',borderWidth:1.5}]},options:{responsive:true,...gc,scales:{x:{ticks:{font:{size:8}}},y:{ticks:{font:{size:9}}}}}});
    } else {
      const sorted=[...DISTRICTS].sort((a,b)=>b.dvCases-a.dvCases);
      mkc('distChart',{type:'bar',data:{labels:sorted.map(d=>d.name.split(' ')[0]),datasets:[{label:'DV Cases',data:sorted.map(d=>d.dvCases),backgroundColor:'#F3E8FF',borderColor:'#6B21A8',borderWidth:1.5}]},options:{responsive:true,...gc,plugins:{legend:{display:false}}}});
    }
  } else if(drillLevel==='district'){
    iDistrictCharts();
  } else if(drillLevel==='taluka'){
    iTalukaCharts();
  }
}

// ── District View ─────────────────────────────────────────────────────
function rDistrictView(){
  const d = DISTRICTS[drillDistrict];
  const rate = parseFloat(samRate(d));
  const cls = sevColor(rate, 2, 3.5);
  return`<div class="page">${schemeTabs()}${levelSteps()}${breadcrumb()}
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px">
    ${drillScheme==='nutrition'?
      kpiH("SAM Cases",n(d.sam),"","🔴","#B42222")+kpiH("MAM Cases",n(d.mam),"","🟡","#C06A00")+kpiH("SAM Rate",samRate(d)+"%","","📊","#1A4480")+kpiH("Underweight",n(d.underweight),"","📉","#B45309")
      :drillScheme==='infra'?
      kpiH("Total AWCs",n(d.awcCount),"","🏠","#1F6B2E")+kpiH("No Toilet",n(d.awcCount-d.awcsWithToilet),"-"+pct(d.awcCount-d.awcsWithToilet,d.awcCount)+"%","🚽","#B42222")+kpiH("No Kitchen",n(d.awcCount-d.awcsWithKitchen),"","🍳","#C06A00")+kpiH("Staff Vacant",n(d.awcCount-d.awcsWithAwwPresent),"","👩","#6B21A8")
      :drillScheme==='childprot'?
      kpiH("Child Marriages",n(d.childMarriageCases),"","🚫","#B42222")+kpiH("Child Labour",n(d.childLabourCases),"","⛏️","#C06A00")+kpiH("DV Cases",n(d.dvCases),"","⚠️","#6B21A8")+kpiH("Talukas",n(d.talukaCount),"","📍","#1A4480")
      :kpiH("DV Cases",n(d.dvCases),"","⚠️","#6B21A8")+kpiH("OSC Cases",n(d.dvCases+Math.round(d.dvCases*0.3)),"","🛡️","#1A4480")+kpiH("Talukas",n(d.talukaCount),"","📍","#0B6E73")+kpiH("AWCs",n(d.awcCount),"","🏠","#1F6B2E")
    }
  </div>
  <div style="display:grid;grid-template-columns:1.2fr 0.8fr;gap:12px">
    <div class="card"><div class="ct">${d.name} — Taluka Breakdown (Click to Drill Down)</div>
    ${rTalukaTable(d)}</div>
    <div>
      <div class="card mb12"><div class="ct">Taluka Comparison</div><canvas id="talukaChart" height="220"></canvas></div>
      <div class="card"><div class="ct">District Summary</div>
        ${drillScheme==='nutrition'?
          prog('SAM Rate',parseFloat(samRate(d)),samRate(d)+'%',rate>=3.5?'#B42222':rate>=2?'#C06A00':'#1F6B2E')+
          prog('MAM Rate',parseFloat(mamRate(d)),mamRate(d)+'%','#C06A00')+
          prog('Underweight %',parseFloat(pct(d.underweight,d.totalChildren)),pct(d.underweight,d.totalChildren)+'%','#B45309')+
          prog('Anemia %',parseFloat(pct(d.anemia,d.totalChildren)),pct(d.anemia,d.totalChildren)+'%','#6B21A8')
          :`<div style="font-size:12px;color:var(--muted)">Select a taluka to see detailed breakdown.</div>`}
      </div>
    </div>
  </div></div>`;
}

function rHotspot(){
  // Aggregate all talukas across all districts
  const allTalukas = DISTRICTS.flatMap(d => d.talukas.map(t => ({...t, districtName:d.name, districtIdx:DISTRICTS.indexOf(d)})));
  const topSAMTalukas = [...allTalukas].sort((a,b)=>b.sam-a.sam).slice(0,10);
  const topCMTalukas = [...allTalukas].sort((a,b)=>b.childMarriageCases-a.childMarriageCases).slice(0,10);
  const topInfraTalukas = [...allTalukas].sort((a,b)=>(b.awcCount-b.awcsWithToilet)-(a.awcCount-a.awcsWithToilet)).slice(0,10);
  const topDVTalukas = [...allTalukas].sort((a,b)=>b.dvCases-a.dvCases).slice(0,10);

  return`<div class="page">
  <div style="margin-bottom:14px">
    <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:var(--navy)">🔥 Hot Spot Finder</div>
    <div style="font-size:12px;color:var(--muted);margin-top:3px">Top 10 worst-performing talukas across the state — for each key indicator</div>
  </div>
  <div class="g2">
    <div class="card">

function rAI(){
  return`<div class="page">
  <div class="mhdr" style="background:linear-gradient(135deg,var(--navy),var(--blue));margin-bottom:12px;display:flex;align-items:center;gap:14px">
    <span style="font-size:36px">🤖</span>

  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
    ${["Top SAM talukas in Kalaburagi?","Which district has most child marriages?","Worst infrastructure gaps by taluka?","Compare Raichur vs Ballari nutrition","Which AWCs need urgent intervention?"].map(s=>`<button style="background:#EEF2F7;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--blue);cursor:pointer;font-weight:600;font-family:inherit" onclick="document.getElementById('chatInp').value='${s}'">${s}</button>`).join('')}
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div class="chat-msgs" id="chatMsgs">${chatHistory.map(m=>m.role==='assistant'?`<div class="chat-row"><div class="chat-av">🤖</div><div class="chat-bbl bot-bbl">${m.text}</div></div>`:`<div class="chat-row user"><div class="chat-bbl user-bbl">${m.text}</div></div>`).join('')}</div>
    <div class="chat-inp-row">
      <input class="chat-inp" id="chatInp" placeholder="Ask about any district, taluka, AWC, or scheme..." onkeydown="if(event.key==='Enter')sendChat()"/>
      <button class="chat-send" onclick="sendChat()">Send ↗</button>
    </div>
  </div></div>`;
}

async function sendChat(){
  const inp=document.getElementById('chatInp');const text=inp.value.trim();if(!text)return;
  inp.value='';chatHistory.push({role:'user',text});
  const msgs=document.getElementById('chatMsgs');
  msgs.innerHTML+=`<div class="chat-row user"><div class="chat-bbl user-bbl">${text}</div></div>`;
  msgs.innerHTML+=`<div class="chat-row" id="chatLoad"><div class="chat-av">🤖</div><div class="chat-dots"><div class="dot" style="animation-delay:0s"></div><div class="dot" style="animation-delay:.4s"></div><div class="dot" style="animation-delay:.8s"></div></div></div>`;
  msgs.scrollTop=msgs.scrollHeight;

  // Build context from actual generated data
  const topSAMDist = [...DISTRICTS].sort((a,b)=>b.sam-a.sam).slice(0,5).map(d=>`${d.name}: ${d.sam} SAM (${samRate(d)}%)`).join(', ');
  const topCMDist = [...DISTRICTS].sort((a,b)=>b.childMarriageCases-a.childMarriageCases).slice(0,5).map(d=>`${d.name}: ${d.childMarriageCases}`).join(', ');
  const allTalukas = DISTRICTS.flatMap(d=>d.talukas.map(t=>({...t,distName:d.name})));
  const topSAMTal = [...allTalukas].sort((a,b)=>b.sam-a.sam).slice(0,5).map(t=>`${t.name} (${t.distName}): ${t.sam} SAM`).join(', ');

  const sys=`You are an expert MIS analytics assistant for WCD Department, Karnataka. You have data for 12 districts, 60 talukas, and 600+ AWCs.

KEY DATA (actual computed values):
Top districts by SAM: ${topSAMDist}
Top districts by child marriage: ${topCMDist}
Top talukas by SAM: ${topSAMTal}
State totals: SAM=${STATE.sam}, MAM=${STATE.mam}, Child Marriages=${STATE.childMarriageCases}, DV Cases=${STATE.dvCases}, AWCs=${STATE.awcCount}

District details: ${DISTRICTS.map(d=>`${d.name}(SAM:${d.sam},MAM:${d.mam},CM:${d.childMarriageCases},DV:${d.dvCases})`).join('; ')}

Provide specific numbers, name exact talukas/AWCs, and give actionable recommendations for government officials planning targeted interventions. Be concise but data-rich.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,system:sys,messages:chatHistory.filter((_,i)=>chatHistory[i].role!=='assistant'||i>0).slice(-8).map(m=>({role:m.role,content:m.text}))})});
    const data=await res.json();const reply=data.content?.[0]?.text||'Unable to process.';
    chatHistory.push({role:'assistant',text:reply});
    document.getElementById('chatLoad')?.remove();
    msgs.innerHTML+=`<div class="chat-row"><div class="chat-av">🤖</div><div class="chat-bbl bot-bbl">${reply.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }catch{
    document.getElementById('chatLoad')?.remove();
    const r='⚠️ Connection error. Please check network and try again.';
    chatHistory.push({role:'assistant',text:r});
    msgs.innerHTML+=`<div class="chat-row"><div class="chat-av">🤖</div><div class="chat-bbl bot-bbl">${r}</div></div>`;
    msgs.scrollTop=msgs.scrollHeight;
  }
}
